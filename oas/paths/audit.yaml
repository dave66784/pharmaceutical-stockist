paths:
  /api/admin/audit-logs:
    get:
      summary: Query compliance audit logs (Admin only)
      description: |
        Returns a paginated, filterable trail of all auditable actions in the system.
        Results are sorted by `createdAt` descending.
      tags:
        - Audit Logs
      security:
        - bearerAuth: []
      parameters:
        - name: action
          in: query
          required: false
          description: Filter by audit action type
          schema:
            type: string
            enum:
              - USER_LOGIN
              - USER_LOGIN_FAILED
              - USER_LOGOUT
              - USER_REGISTERED
              - PASSWORD_RESET_REQUESTED
              - PASSWORD_RESET_COMPLETED
              - PASSWORD_CHANGED
              - PRODUCT_CREATED
              - PRODUCT_UPDATED
              - PRODUCT_DELETED
              - PRODUCT_BULK_DELETED
              - ORDER_PLACED
              - ORDER_CANCELLED
              - ORDER_STATUS_UPDATED
              - ORDERS_EXPORTED
              - USER_ROLE_CHANGED
              - CATEGORY_CREATED
              - CATEGORY_UPDATED
              - CATEGORY_DELETED
              - SUBCATEGORY_CREATED
              - SUBCATEGORY_UPDATED
              - SUBCATEGORY_DELETED
        - name: userEmail
          in: query
          required: false
          description: Partial match on the acting user's email
          schema:
            type: string
            format: email
        - name: entityType
          in: query
          required: false
          description: Entity type (e.g. ORDER, PRODUCT, USER, AUTH, CATEGORY, SUBCATEGORY)
          schema:
            type: string
        - name: from
          in: query
          required: false
          description: Inclusive start date (ISO 8601 date)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          description: Inclusive end date (ISO 8601 date)
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          content:
                            type: array
                            items:
                              $ref: '#/components/schemas/AuditLog'
                          totalElements:
                            type: integer
                            format: int64
                          totalPages:
                            type: integer
                          size:
                            type: integer
                          number:
                            type: integer
        '403':
          description: Admin access required

components:
  schemas:
    AuditLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
          description: The auditable action performed
        entityType:
          type: string
          description: Category of the affected entity (e.g. ORDER, PRODUCT)
        entityId:
          type: string
          description: ID of the affected entity (nullable)
        description:
          type: string
        userEmail:
          type: string
          format: email
          description: Email of the user who performed the action
        ipAddress:
          type: string
          description: IP address of the request
        createdAt:
          type: string
          format: date-time
