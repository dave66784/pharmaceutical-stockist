# Auth paths — OTP-based two-step registration + login

sendOtp:
  post:
    tags:
      - Auth
    summary: Step 1 – Submit registration details and receive an OTP by email
    description: |
      Validates the submitted details (unique email, password strength etc.) and sends
      a 6-digit OTP to the provided email address. The pending registration is held
      in memory for 10 minutes. No account is created at this stage.
    operationId: sendOtp
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/components/schemas/RegisterRequest'
    responses:
      '200':
        description: OTP sent successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
            example:
              success: true
              message: "OTP sent to user@example.com. Please check your inbox."
              data: "otp_sent"
      '400':
        description: Validation error or email already registered
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

resendOtp:
  post:
    tags:
      - Auth
    summary: Resend OTP for a pending registration
    description: |
      Regenerates and resends the OTP for a pending registration. A 60-second cooldown
      is enforced on the frontend; this endpoint does not enforce rate limiting server-side.
    operationId: resendOtp
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      '200':
        description: OTP resent successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
      '400':
        description: No pending registration found for this email
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

verifyOtp:
  post:
    tags:
      - Auth
    summary: Step 2 – Verify OTP and create account
    description: |
      Validates the 6-digit OTP. On success the pending registration is consumed
      (single-use), the user account is created, and a JWT token is returned.
      OTPs expire after 10 minutes.
    operationId: verifyOtp
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - otp
            properties:
              email:
                type: string
                format: email
              otp:
                type: string
                minLength: 6
                maxLength: 6
                pattern: '^\d{6}$'
                example: "482910"
    responses:
      '200':
        description: Account created — JWT token returned
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/components/schemas/AuthResponse'
      '400':
        description: Invalid or expired OTP
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

login:
  post:
    tags:
      - Auth
    summary: Login with email and password
    operationId: loginUser
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Login successful — JWT set in HttpOnly cookie
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/components/schemas/AuthResponse'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

logout:
  post:
    tags:
      - Auth
    summary: Logout — revoke refresh token and clear cookies
    operationId: logout
    responses:
      '200':
        description: Logged out successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

refresh:
  post:
    tags:
      - Auth
    summary: Refresh access token using HttpOnly refresh_token cookie
    description: |
      Reads the `refresh_token` cookie, validates it, and issues a new `access_token`
      cookie. The refresh token is rotated on every use.
    operationId: refreshToken
    security: []
    responses:
      '200':
        description: Token refreshed — new access_token cookie set
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
      '401':
        description: Refresh token missing, invalid, or expired
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

forgotPassword:
  post:
    tags:
      - Auth
    summary: Request a password-reset email
    description: |
      Always returns 200 to avoid email enumeration. If the address is registered
      an email with a reset link is sent.
    operationId: forgotPassword
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
    responses:
      '200':
        description: Reset email sent (if account exists)
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

resetPassword:
  post:
    tags:
      - Auth
    summary: Reset password using a token from the reset email
    operationId: resetPassword
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - token
              - newPassword
            properties:
              token:
                type: string
                description: Reset token received by email
              newPassword:
                type: string
                minLength: 8
    responses:
      '200':
        description: Password reset successfully
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
      '400':
        description: Missing fields, password too short, or token invalid/expired
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'

getMe:
  get:
    tags:
      - Auth
    summary: Get currently authenticated user's profile
    operationId: getMe
    responses:
      '200':
        description: Authenticated user details
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/components/schemas/AuthResponse'
      '401':
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: '../components/schemas/auth.yaml#/components/schemas/ApiResponse'
