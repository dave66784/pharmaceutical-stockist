global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'sdave.dev@gmail.com'
  smtp_auth_username: 'sdave.dev@gmail.com'
  smtp_auth_password: 'ALERTMANAGER_MAIL_PASSWORD_PLACEHOLDER'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'email-warnings'
  routes:
    - match:
        severity: critical
      receiver: 'email-critical'
      repeat_interval: 1h

receivers:
  - name: 'email-critical'
    email_configs:
      - to: 'sdave.dev@gmail.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — Pharma Stockist'

  - name: 'email-warnings'
    email_configs:
      - to: 'sdave.dev@gmail.com'
        send_resolved: true
        headers:
          Subject: '[WARNING] {{ .GroupLabels.alertname }} — Pharma Stockist'
