# SIT (System Integration Testing) Profile Configuration
# ─── OTP Security ─────────────────────────────────────────────────────────────
# No test-override here — users must provide the actual OTP sent to their email.
# app.otp.test-override is intentionally absent.

# OTP email must be enabled so the real OTP is delivered
app.email.customer.notifications.otp-verification.enabled=true

# ─── Email ────────────────────────────────────────────────────────────────────
# Provide real SMTP credentials via environment variables or override here.
# spring.mail.username and spring.mail.password must be set externally.
spring.mail.debug=false

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.pharma=DEBUG
logging.level.org.springframework.security=INFO
spring.jpa.show-sql=false
