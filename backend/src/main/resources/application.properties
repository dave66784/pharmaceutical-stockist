# Application
spring.application.name=pharmaceutical-stockist
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/pharma_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (RSA RS256)
jwt.private.key=${JWT_PRIVATE_KEY}
jwt.public.key=${JWT_PUBLIC_KEY}
jwt.expiration=1800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.pharma=INFO
logging.level.org.springframework.security=INFO

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.metrics.export.prometheus.enabled=true
management.info.env.enabled=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=sdave.dev@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.debug=true

# Email Notification Toggles
# ─── ADMIN Notifications ─────────────────────────────────────────────────────
# Alert admin when a new order is placed
app.email.admin.notifications.order-placed.enabled=true
# Daily low-stock digest sent to admin
app.email.admin.notifications.low-stock.enabled=true
# Whether the low-stock cron scheduler runs at all
app.email.admin.notifications.low-stock-scheduler.enabled=true
# Products with stock below this number are included in the digest
app.notifications.low-stock.threshold=10
# Admin email address for all admin notifications
app.email.admin-address=sdave.dev@gmail.com

# ─── CUSTOMER Notifications ───────────────────────────────────────────────────
# Welcome email on new account registration
app.email.customer.notifications.welcome.enabled=true
# Order confirmation email to customer when order is placed
app.email.customer.notifications.order-confirmation.enabled=true
# Status update email to customer when admin changes order status
app.email.customer.notifications.order-status-update.enabled=true
# OTP verification email on registration
app.email.customer.notifications.otp-verification.enabled=true
# OTP expiry in minutes
app.otp.expiry-minutes=10
# Password reset email
app.email.customer.notifications.password-reset.enabled=true
# Frontend URL used in password reset links
app.frontend.url=http://localhost:3000
